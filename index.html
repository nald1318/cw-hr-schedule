<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>CW, HR 일정</title>
  <link rel="apple-touch-icon" href="apple-touch-icon-v2.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon-v2.png" />
  <meta name="apple-mobile-web-app-title" content="Kids SCH" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#FFF2EF" />
  <style>
    :root{
      --bg:#fff2ef; --card:#fffdfc; --line:#f0cfc9; --strong-line:#d9a9a4;
      --text:#2f3446; --muted:#7b7380; --primary:#5d688a; --primary-2:#7782a3; --rose:#f7a5a5; --peach:#ffdbb6; --cream:#fff7f2;
      --sky:#b7c7ea; --pink:#f7a5a5;
      --shadow:0 10px 28px rgba(93,104,138,.13); --slot-h:24px; --time-w:82px; --head-h:42px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(180deg,var(--bg) 0%,#fffaf7 46%,#fffdfc 100%);color:var(--text)}
    header{position:sticky;top:0;z-index:50;background:rgba(255,242,239,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
    .wrap{max-width:1320px;margin:0 auto;padding:16px}
    .top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
    h1{font-size:24px;margin:0;letter-spacing:-.4px;color:var(--primary)}.sub{font-size:13px;color:var(--muted);margin-top:4px}
    .tabs{display:flex;gap:8px;align-items:center}.tab{border:1px solid #efd0ca;background:linear-gradient(180deg,#fffdfc,#fff7f2);border-radius:999px;padding:9px 16px;cursor:pointer;font-weight:900;color:var(--primary);box-shadow:0 3px 10px rgba(93,104,138,.06)}.tab.active{background:linear-gradient(135deg,var(--primary),var(--primary-2));color:white;border-color:var(--primary);box-shadow:0 7px 18px rgba(93,104,138,.22)}
    .actions{display:flex;gap:8px;flex-wrap:wrap}.btn{border:0;border-radius:12px;padding:10px 14px;font-weight:900;cursor:pointer;background:linear-gradient(135deg,var(--primary),var(--primary-2));color:white;box-shadow:0 6px 16px rgba(93,104,138,.18)}.btn.secondary{background:linear-gradient(180deg,#fffdfc,#fff7f2);color:var(--primary);border:1px solid #edc7c1;box-shadow:0 3px 10px rgba(93,104,138,.06)}.btn.danger{background:linear-gradient(135deg,#d65f63,#b94c55)}.btn.small{padding:7px 10px;border-radius:10px;font-size:12px}
    main.wrap{display:grid;grid-template-columns:372px minmax(0,1fr);gap:16px}
    main.form-closed{grid-template-columns:1fr}.schedulePanel{min-width:0}.panel{background:rgba(255,253,252,.96);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);padding:16px}.panel h2{font-size:17px;margin:0 0 12px}.field{margin-bottom:12px}.field label{display:block;font-size:12px;font-weight:800;color:#625f70;margin-bottom:6px}.field input,.field select,.field textarea{width:100%;border:1px solid #e9c3bd;border-radius:12px;padding:10px 12px;font-size:14px;background:#fffdfc;color:var(--text)}.field textarea{min-height:74px;resize:vertical}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.radioRow{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.chip{display:inline-flex;align-items:center;gap:7px;border:1px solid #efd0ca;border-radius:999px;padding:8px 11px;background:#fffaf7;font-size:13px;font-weight:800;color:var(--primary)}.dot{width:13px;height:13px;border-radius:50%;display:inline-block;border:1px solid rgba(0,0,0,.07)}
    .palette{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.swatch{height:34px;border-radius:12px;border:2px solid transparent;cursor:pointer}.swatch.active{border-color:var(--primary);box-shadow:0 0 0 2px white inset,0 0 0 4px rgba(93,104,138,.18)}
    .legend{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.legend .chip{font-size:12px;padding:7px 10px}.weekbar{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}.weekbar strong{font-size:18px}.daySelect{display:flex;gap:6px;flex-wrap:wrap}.daybtn{border:1px solid #efd0ca;background:linear-gradient(180deg,#fffdfc,#fff7f2);border-radius:999px;padding:8px 12px;cursor:pointer;font-weight:900;color:var(--primary)}.daybtn.active{background:linear-gradient(135deg,var(--rose),var(--peach));color:#4b475f;border-color:#f0b7a6}.scheduleBox{overflow:auto;border:1px solid var(--line);border-radius:18px;background:#fffdfc;max-height:calc(100vh - 170px)}
    .grid{display:grid;min-width:1040px;position:relative}.grid.week{grid-template-columns:var(--time-w) repeat(6,1fr)}.grid.day{grid-template-columns:var(--time-w) minmax(520px,1fr)}
    .head{position:sticky;top:0;z-index:6;min-height:var(--head-h);background:linear-gradient(180deg,#fff7f2,#fff2ef);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-weight:900;color:var(--primary)}.timeHead{position:sticky;left:0;z-index:7;background:linear-gradient(180deg,#fff7f2,#fff2ef)}
    .time,.cell{height:var(--slot-h);min-height:var(--slot-h);border-bottom:1px solid var(--line)}
    .time{position:sticky;left:0;z-index:4;background:#fff7f2;color:#7b7380;font-size:11px;display:flex;align-items:flex-start;justify-content:center;padding-top:2px;border-right:1px solid var(--line)}
    .time.label30{font-weight:800;color:#6d6b7e}.time.hour{font-size:12px;font-weight:900;color:var(--primary)}.time.hour,.cell.hour{border-top:2px solid var(--strong-line)}.time.half,.cell.half{border-top:1.5px solid var(--strong-line)}
    .cell{border-right:1px solid var(--line);position:relative;background:#fffdfc}.cell:hover{background:#fff7f2}
    .daycol{position:relative;pointer-events:none}.event{position:absolute;left:5px;right:5px;border-radius:12px;padding:6px 8px;overflow:hidden;border:1px solid rgba(93,104,138,.16);box-shadow:0 5px 12px rgba(93,104,138,.13);font-size:12px;cursor:pointer;z-index:3;pointer-events:auto;color:#313447}.event:hover{outline:2px solid rgba(93,104,138,.28)}.event .title{font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.event .meta{font-size:11px;color:#4b4855;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.event .memoText{font-size:11px;color:#5f5968;margin-top:3px;line-height:1.2;white-space:normal;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.childBadge{display:inline-block;border-radius:999px;padding:1px 6px;font-size:10px;font-weight:900;margin-right:4px;background:rgba(255,255,255,.65)}.empty{padding:20px;color:var(--muted);font-size:14px}.list{display:flex;flex-direction:column;gap:8px;margin-top:12px}.listItem{border:1px solid var(--line);border-radius:14px;padding:10px;background:#fff;cursor:pointer}.listItem:hover{border-color:#c9c4d8}.listItem strong{display:block;font-size:14px}.listItem span{font-size:12px;color:var(--muted)}.hidden{display:none!important}.notice{background:#fff8df;border:1px solid #f1df9a;color:#5a4b12;border-radius:14px;padding:10px;font-size:13px;line-height:1.45;margin-bottom:12px}.modeBox{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.modeBox .chip{justify-content:center;text-align:center}.modeBadge{font-size:12px;color:var(--primary);background:#fff7f2;border:1px solid var(--line);border-radius:999px;padding:7px 10px;font-weight:800}

    .label-mobile{display:none}
    .weekbar .actions{flex-shrink:0}
    .splitHead{display:flex;flex-direction:column;gap:2px;align-items:stretch;text-align:center}.splitHead .lanes{display:grid;grid-template-columns:1fr 1fr;width:100%;font-size:10px;color:var(--muted);font-weight:900;text-align:center}.splitHead .lanes span{display:flex;align-items:center;justify-content:center;text-align:center;width:100%}.splitHead .lanes span:first-child{border-right:1px solid var(--line)}
    .event.split-HR{left:4px;right:calc(50% + 3px)}.event.split-CW{left:calc(50% + 3px);right:4px}
    @media(max-width:900px){main.wrap{grid-template-columns:1fr}.scheduleBox{max-height:70vh}.top{align-items:flex-start}.tabs{width:100%}.grid{min-width:900px}}

    /* iPhone / mobile first tuning: no sideways cut-off, compact timetable */
    @media(max-width:600px){
      :root{--time-w:38px;--slot-h:18px;--head-h:34px}
      body{overflow-x:hidden;background:#fff2ef}
      .wrap{width:100%;max-width:100%;padding:10px}
      header{position:sticky;top:0}
      .top{gap:8px}
      h1{font-size:20px;line-height:1.15}
      .sub{font-size:11px;line-height:1.25}
      .tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;width:100%}
      .tab{padding:9px 0;font-size:12px;text-align:center}
      main.wrap{display:flex;flex-direction:column;gap:10px;padding-top:10px}
      .panel{border-radius:16px;padding:12px;box-shadow:0 4px 14px rgba(31,31,48,.06)}
      .panel:first-child{order:2}
      .panel:nth-child(2){order:1}
      .panel h2{font-size:15px}
      .notice{font-size:11px;padding:8px;margin-bottom:10px}
      .row{grid-template-columns:1fr 1fr;gap:8px}
      .field{margin-bottom:9px}
      .field label{font-size:11px;margin-bottom:4px}
      .field input,.field select,.field textarea{font-size:13px;padding:9px 9px;border-radius:10px}
      .field textarea{min-height:58px}
      .palette{grid-template-columns:repeat(8,1fr);gap:5px}
      .swatch{height:28px;border-radius:9px}
      .chip{font-size:11px;padding:7px 8px}
      .actions{gap:6px}
      .btn{padding:9px 10px;border-radius:10px;font-size:13px}
      .btn.small{font-size:11px;padding:7px 8px}
      .legend{display:none}
      .weekbar{display:block;gap:0;margin-bottom:8px}
      .weekbar strong{font-size:15px}
      .weekbar .actions,.weekbar .navActions{width:100%;max-width:100%;display:grid!important;grid-template-columns:.78fr .9fr .82fr .9fr .9fr;gap:3px;align-items:stretch;flex-wrap:nowrap!important;margin:7px 0 6px}
      .label-full{display:none}
      .label-mobile{display:inline}
      .weekbar .btn.small{height:28px;display:flex;align-items:center;justify-content:center;min-width:0;width:100%;white-space:nowrap;word-break:keep-all;line-height:1;font-size:10px;padding:0 1px;letter-spacing:-.35px}
      .daySelect{width:100%;display:grid;grid-template-columns:repeat(6,1fr);gap:4px}
      .daybtn{padding:7px 0;font-size:11px}
      .scheduleBox{overflow-x:hidden;overflow-y:auto;border-radius:14px;max-height:64vh;width:100%}
      .grid{min-width:0!important;width:100%}
      .grid.week{grid-template-columns:var(--time-w) repeat(6,minmax(0,1fr))!important}
      .grid.day{grid-template-columns:var(--time-w) minmax(0,1fr)!important}
      .head{min-height:var(--head-h);font-size:11px;padding:0 2px;text-align:center;line-height:1.15;overflow:hidden}
      .head .sub{display:none}
      .timeHead{font-size:10px}
      .splitHead{gap:0}
      .splitHead .lanes{font-size:8px;line-height:1}
      .time{font-size:8px;padding-top:1px;align-items:flex-start;justify-content:center}
      .time.hour{font-size:9px}
      .time.label30{font-size:8px}
      .cell{min-width:0}
      .event{left:2px;right:2px;border-radius:7px;padding:2px 3px;font-size:9px;line-height:1.1;box-shadow:0 2px 6px rgba(0,0,0,.08)}
      .event.split-HR{left:2px;right:calc(50% + 1px)}
      .event.split-CW{left:calc(50% + 1px);right:2px}
      .event .title{font-size:9px;letter-spacing:-.2px;white-space:normal;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
      .event .meta{display:none}
      .event .memoText{display:-webkit-box;font-size:7px;line-height:1.05;margin-top:1px;-webkit-line-clamp:2;color:#625b68}
      .childBadge{display:none}
      .list{margin-top:10px}
      .listItem{padding:9px;border-radius:12px}
      .listItem strong{font-size:13px}
      .listItem span{font-size:11px}
      .modeBox{display:grid;grid-template-columns:1fr 1fr;gap:6px}
      .modeBadge{grid-column:1 / -1;text-align:center;font-size:11px}
    }

    @media(max-width:380px){
      :root{--time-w:28px;--slot-h:16px;--head-h:30px}
      .tab{font-size:11px}
      .head{font-size:8px}
      .event .title{font-size:7px}
      .event .memoText{font-size:6px}
      .time.hour{font-size:7px}
    }


    /* iPhone 15 Pro width tuning: force the whole WEEK grid into one screen */
    @media(max-width:430px){
      :root{--time-w:30px;--slot-h:17px;--head-h:32px}
      html,body{width:100%;max-width:100%;overflow-x:hidden}
      .wrap{padding-left:6px;padding-right:6px;overflow-x:hidden}
      .schedulePanel,.scheduleBox,.grid,.weekbar,.tabs{min-width:0;max-width:100%}
      .weekbar .actions,.weekbar .navActions{width:100%;display:grid!important;grid-template-columns:.74fr .88fr .8fr .88fr .88fr;gap:2px;align-items:stretch;flex-wrap:nowrap!important}
      .weekbar .btn.small{font-size:9px;padding:0 1px;min-width:0;width:100%;height:27px;white-space:nowrap;overflow:hidden;text-overflow:clip;letter-spacing:-.55px;border-radius:9px;line-height:1;display:flex;align-items:center;justify-content:center}
      .grid.week{grid-template-columns:var(--time-w) repeat(6,minmax(0,1fr))!important}
      .head{font-size:9px;min-width:0;white-space:normal;letter-spacing:-.4px;padding:0 1px}
      .splitHead>div:first-child{white-space:nowrap;overflow:hidden;text-overflow:clip;width:100%}
      .splitHead .lanes{font-size:7px}
      .time{font-size:7px}
      .time.hour{font-size:8px}
      .time.label30{font-size:7px}
      .event{left:1px;right:1px;padding:2px 1px;border-radius:6px}
      .event.split-HR{left:1px;right:calc(50% + 1px)}
      .event.split-CW{left:calc(50% + 1px);right:1px}
      .event .title{font-size:8px;line-height:1.05;letter-spacing:-.5px}
      .event .memoText{font-size:7px;line-height:1.05}
      .daybtn{font-size:10px}
    }
      @media(max-width:380px){
      :root{--time-w:28px;--slot-h:16px;--head-h:30px}
      .head{font-size:8px}
      .event .title{font-size:7px}
      .time.hour{font-size:7px}
    }

    @media(max-width:380px){
      .weekbar .actions,.weekbar .navActions{grid-template-columns:.7fr .85fr .76fr .85fr .86fr;gap:2px}
      .weekbar .btn.small{font-size:8px;padding-left:0;padding-right:0;letter-spacing:-.65px;height:26px}
    }

  </style>
</head>
<body>
<header>
  <div class="wrap top">
    <div><h1>CW, HR 일정</h1><div class="sub" id="headerSub">CW · HR / 월~토 / 10분 단위</div></div>
    <div class="tabs"><button class="tab active" data-view="week">WEEK</button><button class="tab" data-view="day">DAY</button><button class="tab" data-view="CW">CW</button><button class="tab" data-view="HR">HR</button></div>
  </div>
</header>
<main class="wrap">
  <section class="panel" id="formPanel">
    <h2 id="formTitle">일정 입력</h2>
    <div class="notice">정각과 30분은 글씨로 표시됩니다. 일반 모드는 12:00~20:00, 방학 모드는 08:00~20:00까지 10분 단위로 입력됩니다.</div>

    <div class="field">
      <label>시간표 모드</label>
      <div class="modeBox">
        <label class="chip"><input type="radio" name="timeMode" id="normalMode" value="normal" /> 일반모드</label>
        <label class="chip"><input type="radio" name="timeMode" id="vacationMode" value="vacation" /> 방학모드</label>
        <span class="modeBadge" id="modeText">일반 12:00~20:00</span>
      </div>
    </div>

    <input type="hidden" id="eventId" />
    <div class="field"><label>아이</label><select id="child"><option value="CW">CW</option><option value="HR">HR</option></select></div>
    <div class="field"><label>일정명</label><input id="title" placeholder="예: 수학학원, 축구, 피아노" /></div>
    <div class="row">
      <div class="field"><label>요일</label><select id="weekday"></select></div>
      <div class="field"><label>반복 여부</label><select id="repeat"><option value="none">반복없음</option><option value="weekly">매주</option><option value="biweekly">2주</option><option value="thisweek">이번주만</option><option value="custom">상세한 날짜</option></select></div>
    </div>
    <div class="field hidden" id="repeatDateBox"><label id="repeatDateLabel">날짜</label><input type="date" id="repeatDate" /></div>
    <div class="row">
      <div class="field"><label>시작 시간</label><select id="start"></select></div>
      <div class="field"><label>종료 시간</label><select id="end"></select></div>
    </div>
    <div class="field"><label>색상 선택 / 파스텔 8가지</label><div class="palette" id="palette"></div></div>
    <div class="field"><label>메모</label><textarea id="memo" placeholder="준비물, 장소, 선생님 연락처, 변동사항 등"></textarea></div>
    <div class="actions"><button class="btn" id="saveBtn">저장</button><button class="btn secondary" id="resetBtn">새 일정</button><button class="btn secondary" id="closeBtn">닫기</button><button class="btn danger hidden" id="deleteBtn">삭제</button></div>
    <div class="legend"><span class="chip"><span class="dot" style="background:var(--sky)"></span>CW</span><span class="chip"><span class="dot" style="background:var(--pink)"></span>HR</span></div>
    <div class="list" id="todayList"></div>
  </section>
  <section class="panel schedulePanel" id="schedulePanel">
    <div class="weekbar">
      <div><strong id="rangeTitle"></strong><div class="sub">일정을 클릭하면 왼쪽에서 바로 수정할 수 있습니다.</div></div>
      <div class="actions navActions"><button class="btn small" id="todayBtn"><span>오늘</span></button><button class="btn secondary small" id="prevWeek"><span class="label-full">&lt; 이전 주</span><span class="label-mobile">&lt;이전</span></button><button class="btn secondary small" id="thisWeek"><span class="label-full">이번 주</span><span class="label-mobile">이번</span></button><button class="btn secondary small" id="nextWeek"><span class="label-full">다음 주 &gt;</span><span class="label-mobile">다음&gt;</span></button><button class="btn small" id="addEventBtn"><span class="label-full">일정 추가</span><span class="label-mobile">+추가</span></button></div>
      <div class="daySelect" id="daySelect"></div>
    </div>
    <div class="scheduleBox"><div id="calendar" class="grid week"></div></div>
  </section>
</main>
<script>
const days=[{k:1,n:'월'},{k:2,n:'화'},{k:3,n:'수'},{k:4,n:'목'},{k:5,n:'금'},{k:6,n:'토'}];
const children={CW:{label:'CW',base:'#aebadb'},HR:{label:'HR',base:'#f7a5a5'}};
const colors=['#aebadb','#e78e8e','#f0b47c','#e7c093','#cf9fa8','#9fb4d6','#d49a82','#b8a4c9'];
let events=JSON.parse(localStorage.getItem('kidsTimetableEvents')||'[]').map(e=>({...e, repeat:e.repeat==='once'?'thisweek':(e.repeat||'weekly'), date:e.date||''}));
let view='week', selectedDay=1, selectedColor=colors[0], weekOffset=0;
let settings=JSON.parse(localStorage.getItem('kidsTimetableSettings')||'{"vacationMode":false}');
const $=id=>document.getElementById(id);
function pad(n){return String(n).padStart(2,'0')}
function modeStart(){return settings.vacationMode?8*60:12*60}
function modeEnd(){return 20*60}
function minutesToStr(m){return `${pad(Math.floor(m/60))}:${pad(m%60)}`}
function strToMinutes(s){const [h,m]=s.split(':').map(Number);return h*60+m}
function getMonday(date=new Date()){const d=new Date(date);const day=d.getDay()||7;d.setDate(d.getDate()-day+1+weekOffset*7);d.setHours(0,0,0,0);return d}
function dateKey(d){return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}
function dayDate(weekday){const mon=getMonday();const d=new Date(mon);d.setDate(mon.getDate()+weekday-1);return d}
function monthDayText(date){return `${date.getMonth()+1}/${date.getDate()}`}
function dayHeaderText(dayObj){return `${monthDayText(dayDate(dayObj.k))} (${dayObj.n})`}
function weeksBetween(a,b){const da=new Date(a+'T00:00:00'), db=new Date(b+'T00:00:00'); if(isNaN(da)||isNaN(db)) return 0; const diff=db-da; return Math.round(diff/(7*24*60*60*1000));}
function saveLocal(){localStorage.setItem('kidsTimetableEvents',JSON.stringify(events));}
function saveSettings(){localStorage.setItem('kidsTimetableSettings',JSON.stringify(settings));}
function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}
function cssPxVar(name, fallback){const v=getComputedStyle(document.documentElement).getPropertyValue(name).trim(); const n=parseFloat(v); return Number.isFinite(n)?n:fallback;}
function initStatic(){
  $('weekday').innerHTML=days.map(d=>`<option value="${d.k}">${d.n}요일</option>`).join('');
  $('palette').innerHTML=colors.map((c,i)=>`<button type="button" class="swatch ${i===0?'active':''}" style="background:${c}" data-color="${c}" title="${c}"></button>`).join('');
  [...document.querySelectorAll('.swatch')].forEach(b=>b.onclick=()=>{selectedColor=b.dataset.color;document.querySelectorAll('.swatch').forEach(x=>x.classList.remove('active'));b.classList.add('active')});
  renderDayButtons();
}
function renderDayButtons(){
  $('daySelect').innerHTML=days.map(d=>`<button class="daybtn ${d.k===selectedDay?'active':''}" data-day="${d.k}">${d.n}</button>`).join('');
  [...document.querySelectorAll('.daybtn')].forEach(b=>b.onclick=()=>{selectedDay=+b.dataset.day;render();});
}
function rebuildTimeSelects(keep=false){
  const oldStart=$('start').value, oldEnd=$('end').value;
  let times=[]; for(let m=modeStart();m<=modeEnd();m+=10) times.push(m);
  $('start').innerHTML=times.slice(0,-1).map(m=>`<option value="${minutesToStr(m)}">${minutesToStr(m)}</option>`).join('');
  $('end').innerHTML=times.slice(1).map(m=>`<option value="${minutesToStr(m)}">${minutesToStr(m)}</option>`).join('');
  const fallbackStart=settings.vacationMode?'09:00':'15:00';
  const fallbackEnd=settings.vacationMode?'10:00':'16:00';
  $('start').value=(keep && [...$('start').options].some(o=>o.value===oldStart))?oldStart:fallbackStart;
  $('end').value=(keep && [...$('end').options].some(o=>o.value===oldEnd))?oldEnd:fallbackEnd;
  $('normalMode').checked=!settings.vacationMode;
  $('vacationMode').checked=!!settings.vacationMode;
  $('modeText').textContent=settings.vacationMode?'방학 08:00~20:00':'일반 12:00~20:00';
  $('headerSub').textContent=settings.vacationMode?'CW · HR / 월~토 / 방학모드 08:00~20:00 / 10분 단위':'CW · HR / 월~토 / 일반 12:00~20:00 / 10분 단위';
}
function eventOccurs(e, weekday){
  if(e.weekday!==weekday) return false;
  const dk=dateKey(dayDate(weekday));
  const repeat=e.repeat||'weekly';
  if(repeat==='weekly') return true;
  if(repeat==='biweekly'){
    if(!e.date) return true;
    return weeksBetween(e.date, dk) >= 0 && weeksBetween(e.date, dk) % 2 === 0;
  }
  if(repeat==='none' || repeat==='thisweek' || repeat==='custom') return e.date===dk;
  return e.date===dk;
}
function visibleEvents(weekday){
  const s=modeStart(), end=modeEnd();
  return events.filter(e=>eventOccurs(e,weekday)).filter(e=>strToMinutes(e.end)>s && strToMinutes(e.start)<end).sort((a,b)=>strToMinutes(a.start)-strToMinutes(b.start));
}
function renderRange(){const mon=getMonday();const sat=new Date(mon);sat.setDate(mon.getDate()+5);$('rangeTitle').textContent=`${mon.getFullYear()}.${pad(mon.getMonth()+1)}.${pad(mon.getDate())} ~ ${pad(sat.getMonth()+1)}.${pad(sat.getDate())}`}
function timeLabelClass(m){return m%60===0?'hour':(m%60===30?'half label30':'')}
function timeLabelText(m){return (m%60===0||m%60===30)?minutesToStr(m):''}
function render(){
  renderRange();
  renderDayButtons();
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.view===view));
  document.querySelectorAll('.daybtn').forEach(b=>b.classList.toggle('active',+b.dataset.day===selectedDay));
  const cal=$('calendar');
  const childFilter=(view==='CW'||view==='HR')?view:null;
  const scheduleView=(view==='day')?'day':'week';
  cal.className=`grid ${scheduleView}`;
  const showDays=view==='day'?days.filter(d=>d.k===selectedDay):days;
  const slotCount=(modeEnd()-modeStart())/10;
  cal.style.gridTemplateRows=`var(--head-h) repeat(${slotCount}, var(--slot-h))`;

  // 중요: CSS Grid의 자동 배치에 맡기면 모바일/PC 전환 시 시간 라벨과 줄이 어긋날 수 있으므로
  // 모든 시간 라벨과 셀에 grid-row/grid-column을 명시해서 같은 10분 행을 공유하게 만든다.
  let html=`<div class="head timeHead" style="grid-column:1;grid-row:1">시간</div>`;
  showDays.forEach((d,idx)=>{
    const headerTxt=dayHeaderText(d);
    const col=idx+2;
    if(childFilter){
      html+=`<div class="head" style="grid-column:${col};grid-row:1">${headerTxt} · ${childFilter}</div>`;
    }else{
      html+=`<div class="head splitHead" style="grid-column:${col};grid-row:1"><div>${headerTxt}</div><div class="lanes"><span>HR</span><span>CW</span></div></div>`;
    }
  });
  let row=2;
  for(let m=modeStart();m<modeEnd();m+=10,row++){
    const cls=timeLabelClass(m);
    html+=`<div class="time ${cls}" style="grid-column:1;grid-row:${row}">${timeLabelText(m)}</div>`;
    showDays.forEach((d,idx)=>{
      const col=idx+2;
      html+=`<div class="cell ${cls}" style="grid-column:${col};grid-row:${row}" data-day="${d.k}" data-time="${minutesToStr(m)}"></div>`;
    });
  }
  cal.innerHTML=html;

  const actualSlotH=cssPxVar('--slot-h',24);
  showDays.forEach((d,idx)=>{
    const col=document.createElement('div'); col.className='daycol';
    col.style.gridColumn=String(idx+2);
    col.style.gridRow=`2 / ${slotCount+2}`;
    col.style.height=`calc(var(--slot-h) * ${slotCount})`;
    col.style.position='relative'; col.style.pointerEvents='none';
    let dayEvents=visibleEvents(d.k);
    if(childFilter) dayEvents=dayEvents.filter(e=>e.child===childFilter);
    dayEvents.forEach(e=>{
      const start=Math.max(strToMinutes(e.start),modeStart()), end=Math.min(strToMinutes(e.end),modeEnd());
      const top=((start-modeStart())/10)*actualSlotH+2; const h=Math.max(((end-start)/10)*actualSlotH-4,22);
      const div=document.createElement('div'); div.className='event';
      if(!childFilter) div.classList.add(e.child==='HR'?'split-HR':'split-CW');
      div.style.top=top+'px'; div.style.height=h+'px'; div.style.background=e.color; div.dataset.id=e.id;
      div.innerHTML=`<div class="title"><span class="childBadge" style="background:${children[e.child].base}">${e.child}</span>${escapeHtml(e.title)}</div><div class="meta">${e.start}-${e.end} · ${repeatText(e)}</div>${e.memo?`<div class="memoText">${escapeHtml(e.memo)}</div>`:''}`;
      div.addEventListener('click',(ev)=>{ev.stopPropagation();loadEvent(e.id)});
      col.appendChild(div);
    });
    cal.appendChild(col);
  });
  renderList();
}
function repeatText(e){const r=e.repeat||'weekly'; if(r==='weekly')return '매주'; if(r==='biweekly')return '2주'; if(r==='thisweek')return '이번주만'; if(r==='custom')return `상세날짜 ${e.date||''}`; if(r==='none')return '반복없음'; return '변동';}
function renderList(){
  const list=$('todayList');
  const childFilter=(view==='CW'||view==='HR')?view:null;
  let arr=visibleEvents(selectedDay);
  if(childFilter) arr=arr.filter(e=>e.child===childFilter);
  const label=childFilter?`${childFilter} 선택 요일 일정`:'선택 요일 일정';
  if(!arr.length){list.innerHTML=`<div class="empty">${label}이 없습니다.</div>`;return}
  list.innerHTML=`<h2>${label}</h2>`+arr.map(e=>`<div class="listItem" onclick="loadEvent('${e.id}')"><strong>${e.child} · ${escapeHtml(e.title)}</strong><span>${monthDayText(dayDate(e.weekday))} (${days.find(x=>x.k===e.weekday).n}) ${e.start}-${e.end} / ${repeatText(e)}</span></div>`).join('')
}
function openForm(){
  $('formPanel').classList.remove('hidden');
  document.querySelector('main.wrap').classList.remove('form-closed');
  setTimeout(()=>{$('formPanel').scrollIntoView({behavior:'smooth',block:'start'});},0);
}
function closeForm(){
  $('formPanel').classList.add('hidden');
  document.querySelector('main.wrap').classList.add('form-closed');
}
function resetForm(){
  ['eventId','title','memo','repeatDate'].forEach(id=>$(id).value='');
  $('child').value='CW'; $('weekday').value=selectedDay; $('repeat').value='weekly'; $('repeatDate').value=dateKey(dayDate(selectedDay)); toggleRepeatDateBox();
  rebuildTimeSelects(false);
  selectedColor=colors[0];document.querySelectorAll('.swatch').forEach((b,i)=>b.classList.toggle('active',i===0));
  $('formTitle').textContent='일정 입력';$('deleteBtn').classList.add('hidden')
}
function loadEvent(id){
  const e=events.find(x=>x.id===id); if(!e) return;
  $('eventId').value=e.id; $('child').value=e.child; $('title').value=e.title; $('weekday').value=e.weekday; $('repeat').value=e.repeat||'weekly'; $('repeatDate').value=e.date||dateKey(dayDate(e.weekday)); toggleRepeatDateBox();
  const st=strToMinutes(e.start), en=strToMinutes(e.end);
  if(st<modeStart() || en>modeEnd()){ settings.vacationMode=true; saveSettings(); rebuildTimeSelects(true); }
  $('start').value=e.start; $('end').value=e.end; $('memo').value=e.memo||'';
  selectedColor=e.color; document.querySelectorAll('.swatch').forEach(b=>b.classList.toggle('active',b.dataset.color===selectedColor));
  $('formTitle').textContent='일정 수정'; $('deleteBtn').classList.remove('hidden'); openForm();
}
function saveEvent(){
  const start=$('start').value,end=$('end').value;
  if(strToMinutes(end)<=strToMinutes(start)){alert('종료 시간은 시작 시간보다 늦어야 합니다.');return}
  if(!$('title').value.trim()){alert('일정명을 입력하세요.');return}
  const weekday=+$('weekday').value; const id=$('eventId').value||crypto.randomUUID();
  const repeat=$('repeat').value;
  let eventDate=dateKey(dayDate(weekday));
  if((repeat==='none' || repeat==='custom' || repeat==='biweekly') && $('repeatDate').value) eventDate=$('repeatDate').value;
  if(repeat==='custom' && !$('repeatDate').value){alert('상세한 날짜를 입력하세요.');return}
  const e={id,child:$('child').value,title:$('title').value.trim(),weekday,repeat,date:eventDate,start,end,color:selectedColor,memo:$('memo').value.trim(),createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()};
  const idx=events.findIndex(x=>x.id===id); if(idx>=0) events[idx]=e; else events.push(e);
  selectedDay=weekday; saveLocal(); resetForm(); render(); closeForm();
}
function deleteEvent(){const id=$('eventId').value;if(!id)return;if(confirm('이 일정을 삭제할까요?')){events=events.filter(e=>e.id!==id);saveLocal();resetForm();render();closeForm();}}
function toggleRepeatDateBox(){
  const r=$('repeat').value;
  const show=(r==='none'||r==='biweekly'||r==='custom');
  $('repeatDateBox').classList.toggle('hidden',!show);
  if(r==='none') $('repeatDateLabel').textContent='반복없는 일정 날짜';
  else if(r==='biweekly') $('repeatDateLabel').textContent='2주 반복 시작 날짜';
  else if(r==='custom') $('repeatDateLabel').textContent='상세 날짜';
  if(show && !$('repeatDate').value) $('repeatDate').value=dateKey(dayDate(+$('weekday').value));
}
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{view=t.dataset.view; if(view==='CW'||view==='HR'){$('child').value=view; if(!$('eventId').value){selectedColor=view==='CW'?colors[0]:colors[1];document.querySelectorAll('.swatch').forEach(b=>b.classList.toggle('active',b.dataset.color===selectedColor));}} render();});
$('saveBtn').onclick=saveEvent; $('resetBtn').onclick=()=>{resetForm();openForm();}; $('closeBtn').onclick=closeForm; $('deleteBtn').onclick=deleteEvent; $('addEventBtn').onclick=()=>{resetForm();openForm();};
$('prevWeek').onclick=()=>{weekOffset--;render()}; $('nextWeek').onclick=()=>{weekOffset++;render()}; $('thisWeek').onclick=()=>{weekOffset=0;render()}; $('todayBtn').onclick=()=>{const wd=new Date().getDay()||7; selectedDay=(wd>=1&&wd<=6)?wd:1; weekOffset=0; view='day'; render();};
$('child').onchange=()=>{if(!$('eventId').value){selectedColor=$('child').value==='CW'?colors[0]:colors[1];document.querySelectorAll('.swatch').forEach(b=>b.classList.toggle('active',b.dataset.color===selectedColor));}}
document.querySelectorAll('input[name="timeMode"]').forEach(r=>r.onchange=()=>{settings.vacationMode=$('vacationMode').checked; saveSettings(); rebuildTimeSelects(true); render();});
$('repeat').onchange=toggleRepeatDateBox;
$('weekday').onchange=()=>{ if(!$('repeatDate').value || ['thisweek','none'].includes($('repeat').value)) $('repeatDate').value=dateKey(dayDate(+$('weekday').value)); toggleRepeatDateBox(); };
initStatic(); rebuildTimeSelects(false); resetForm(); closeForm(); render();
</script>
</body>
</html>
